services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: aida_postgres
    env_file:
      - backend/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aida}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aida}
      POSTGRES_DB: ${POSTGRES_DB:-aida_assessments}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aida-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aida} -d ${POSTGRES_DB:-aida_assessments}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aida_backend
    env_file:
      - backend/.env
    environment:
      # DB_HOST is set by switch-db.sh in root .env (default: postgres)
      POSTGRES_HOST: ${DB_HOST:-postgres}
      POSTGRES_DB: ${DB_NAME:-aida_assessments}
      # MCP/agent code runs inside this container, so it must call the internal app port.
      BACKEND_API_URL: http://localhost:8000/api
    ports:
      - "8181:8000"
    volumes:
      # Mount source code for hot reload (exclude venv to avoid conflicts)
      # :z flag enables SELinux compatibility (RHEL/Fedora)
      - ./backend:/app:z
      - /app/venv
      # Mount Docker socket to allow backend to execute docker commands
      # SECURITY NOTE: This gives the backend container access to the Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount logs directory with SELinux flag
      - ./backend/logs:/app/logs:z
    networks:
      - aida-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aida_frontend
    environment:
      # Browser uses same-origin /api via Vite proxy; Vite forwards to backend service inside Docker.
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      # Mount source code for hot reload (exclude node_modules to avoid conflicts)
      # :z flag enables SELinux compatibility (RHEL/Fedora)
      - ./frontend:/app:z
      - /app/node_modules
    networks:
      - aida-network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5173" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # AIDA Pentest Container
  # Lightweight execution environment for AI-driven assessments.
  # The backend connects to this container via Docker socket (docker exec).
  aida-pentest:
    build:
      context: ./pentest
      dockerfile: Dockerfile
    container_name: aida-pentest
    tty: true
    stdin_open: true
    volumes:
      # Workspace bind mount — same /workspace path as Exegol.
      # workspace_service.py discovers this path via docker inspect, so the
      # host path resolution in aida.py continues to work without changes.
      - ${HOME}/.aida/workspaces:/workspace
    networks:
      - aida-network
    restart: unless-stopped

networks:
  aida-network:
    name: aida-network
    driver: bridge

volumes:
  postgres_data:
    name: aida_postgres_data
